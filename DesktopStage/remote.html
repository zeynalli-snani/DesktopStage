<!DOCTYPE html>
<html>
<head>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Desktop Stage Remote</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .btn {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.25rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.5);
            transition: transform 0.1s;
        }

            .btn:active {
                transform: scale(0.95);
                background: #2563eb;
            }
    </style>
</head>
<body>
    <h1>Desktop Stage</h1>
    <p id='status'>Connecting...</p>
    <button class='btn' onclick='sendCommand()'>Toggle Spotlight</button>

    <script>
        // We look up the current hostname (the PC's IP) dynamically!
        const pcIp = window.location.hostname;
        const ws = new WebSocket(`ws://${pcIp}:8081`);
        const status = document.getElementById('status');

        ws.onopen = () => status.textContent = 'Connected to PC!';
        ws.onclose = () => status.textContent = 'Disconnected';

        function sendCommand() {
            ws.send('TOGGLE_SPOTLIGHT');
        }
    </script>
</body>
</html>
